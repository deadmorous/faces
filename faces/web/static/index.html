<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>faces</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <nav class="top-nav container-fluid">
    <span class="brand"><strong>faces</strong></span>
    <ul>
      <li><a href="#/unlabeled" data-nav="unlabeled">Unlabeled</a></li>
      <li><a href="#/classify" data-nav="classify">Classify</a></li>
      <li><a href="#/photos" data-nav="photos">Photos</a></li>
      <li><a href="#/people" data-nav="people">People</a></li>
    </ul>
  </nav>
  <div class="app-layout container-fluid">
    <aside id="sidebar">
      <div class="sidebar-group hidden" id="sb-group-threshold">
        <label>Threshold: <strong id="sb-thresh-val">1.00</strong></label>
        <input type="range" id="sb-thresh" min="0.1" max="2.0" step="0.01">
      </div>
      <div class="sidebar-group hidden" id="sb-group-relsize">
        <label>Rel. size ≥ <strong id="sb-rel-size-val">0.00</strong></label>
        <input type="range" id="sb-rel-size" min="0.0" max="1.0" step="0.05">
      </div>
      <div class="sidebar-group hidden" id="sb-group-algo">
        <label>Algorithm</label>
        <select id="sb-algo"></select>
      </div>
    </aside>
    <main id="app"></main>
  </div>
  <script src="app.js"></script>
</body>
</html>
