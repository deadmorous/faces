<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>faces</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <nav class="top-nav container-fluid">
    <span class="brand"><strong>faces</strong></span>
    <span id="view-title" class="view-title hidden"></span>
    <ul>
      <li><a href="#/photos" data-nav="photos">Photos</a></li>
      <li><a href="#/people" data-nav="people">People</a></li>
      <li><a href="#/unlabeled" data-nav="unlabeled">Unlabeled</a></li>
      <li><a href="#/classify" data-nav="classify">Classify</a></li>
    </ul>
  </nav>
  <div class="app-layout container-fluid">
    <aside id="sidebar">
      <div class="sidebar-group hidden" id="sb-group-threshold">
        <label>Threshold: <strong id="sb-thresh-val">1.00</strong></label>
        <input type="range" id="sb-thresh" min="0.1" max="2.0" step="0.01">
      </div>
      <div class="sidebar-group hidden" id="sb-group-relsize">
        <label>Rel. size ≥ <strong id="sb-rel-size-val">0.00</strong></label>
        <input type="range" id="sb-rel-size" min="0.0" max="1.0" step="0.05">
      </div>
      <div class="sidebar-group hidden" id="sb-group-algo">
        <label>Algorithm</label>
        <select id="sb-algo"></select>
      </div>
      <div class="sidebar-group hidden" id="sb-group-daterange">
        <label>Date range</label>
        <div id="sb-date-coverage" class="year-range-hint"></div>
        <div class="year-range">
          <input type="number" id="sb-date-from" placeholder="From" min="1900" max="2100">
          <span>–</span>
          <input type="number" id="sb-date-to" placeholder="To" min="1900" max="2100">
        </div>
      </div>
      <div class="sidebar-group hidden" id="sb-group-faces">
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;margin:0;">
          <input type="checkbox" id="sb-show-faces"> Show faces
        </label>
      </div>
      <div class="sidebar-group hidden" id="sb-group-labels">
        <label>Show photos with</label>
        <div style="position:relative;">
          <input type="text" id="sb-labels" placeholder="Alice, Bob" autocomplete="off">
          <ul id="sb-labels-dropdown" class="ac-dropdown" hidden></ul>
        </div>
      </div>
      <div class="sidebar-group hidden" id="sb-group-sort">
        <label>Sort by</label>
        <select id="sb-sort">
          <option value="date_asc">Date</option>
          <option value="path_asc">Path</option>
        </select>
      </div>
      <div class="sidebar-group hidden" id="sb-group-timeline">
        <label>Date</label>
        <div id="sb-timeline-pane" class="tl-pane" title="Click to navigate by date">
          <span id="tl-year">—</span>-<span id="tl-month">—</span>-<span id="tl-day">—</span>
        </div>
      </div>
      <div class="sidebar-group hidden" id="sb-group-refrange">
        <label>Reference range</label>
        <div class="year-range">
          <input type="number" id="sb-ref-from" placeholder="From" min="1900" max="2100">
          <span>–</span>
          <input type="number" id="sb-ref-to" placeholder="To" min="1900" max="2100">
        </div>
      </div>
    </aside>
    <main id="app"></main>
  </div>
  <script src="app.js"></script>
</body>
</html>
